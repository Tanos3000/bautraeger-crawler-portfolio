# Render "Blueprint" - lässt Render den Dienst automatisch nach dieser
# Vorlage anlegen (New + → Blueprint → dieses Repo auswählen), statt jede
# Einstellung von Hand im Dashboard zu klicken.
#
# Läuft auf dem kostenlosen "free"-Plan: kein persistenter Disk-Mount (der
# ist bei Render kostenpflichtig). Die SQLite-Datenbank lebt dadurch nur im
# Container und ist bei jedem Neustart/Redeploy wieder leer - für diese
# Portfolio-Version mit fiktiven Beispieldaten unproblematisch. Für echte,
# dauerhafte Daten: disk-Block wieder ergänzen und auf einen bezahlten Plan
# wechseln (siehe render.com/pricing für aktuelle Preise).
services:
  - type: web
    name: bautraeger-crawler
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORTAL_PASSWORT
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
